<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Pediatricats Senior Design Prototype Control Panel</title>
  <style>
    :root {
      --bg: #f7f8fa;
      --card: #ffffff;
      --text: #1f2933;
      --muted: #6b7280;
      --accent: #2563eb;
      --good: #16a34a;
      --running: #eab308;
      --danger: #dc2626;
      --border: #e5e7eb;
    }

    * {
      box-sizing: border-box;
    }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 40px 16px;
    }

    .container {
      max-width: 420px;
      margin: auto;
      background: var(--card);
      border-radius: 12px;
      padding: 32px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
    }

    h1 {
      font-size: 1.4rem;
      margin-bottom: 24px;
    }

    h2 {
      font-size: 1rem;
      margin-bottom: 8px;
      color: var(--muted);
      font-weight: 500;
    }

    p {
      font-size: 0.9rem;
      color: var(--muted);
      margin-bottom: 16px;
    }

    input {
      width: 100%;
      padding: 10px 12px;
      font-size: 1rem;
      border-radius: 8px;
      border: 1px solid var(--border);
      margin-bottom: 16px;
    }

    button {
      width: 100%;
      padding: 12px;
      font-size: 0.95rem;
      border-radius: 8px;
      border: none;
      background: var(--accent);
      color: var(--card);
      cursor: pointer;
      transition: opacity 0.15s ease;
    }

    button.secondary {
      background: var(--border);
      color: var(--text);
    }

    button:hover {
      opacity: 0.6;
    }

    button:active {
      opacity: 1.0;
    }

    button.connected {
      background-color: var(--good);
      color: var(--card);
      cursor: default;
    }

    button.connected:hover {
      opacity: 1;
    }

    .button-row {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }

    .cmd-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .status {
      margin-top: 20px;
      font-size: 0.9rem;
      font-weight: 500;
    }

    .hidden {
      display: none;
    }

    .log {
      margin-top: 24px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
      text-align: left;
    }

    .log-title {
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--muted);
      margin-bottom: 8px;
    }

    #command-log {
      list-style: none;
      padding: 0;
      margin: 0;
      max-height: 120px;
      overflow-y: auto;
    }

    #command-log li {
      font-size: 0.85rem;
      padding: 4px 0;
      color: var(--text);
      border-bottom: 1px solid var(--border);
    }

    #data-log {
      list-style: none;
      padding: 0;
      margin: 0;
      max-height: 120px;
      overflow-y: auto;
    }

    #data-log li {
      font-size: 0.85rem;
      padding: 4px 0;
      color: var(--text);
      border-bottom: 1px solid var(--border);
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Pediatricats Prototype Control Panel</h1>

    <!-- Login -->
    <div id="login-section">
      <h2>Access Required</h2>
      <p>Enter password to enable BLE connection</p>

      <input type="password" id="password-input" placeholder="Password" onkeydown="if (event.key === 'Enter') unlock()">

      <button onclick="unlock()">Unlock</button>
      <div id="login-status" class="status"></div>
    </div>

    <!-- Control Panel -->
    <div id="control-panel" class="hidden">
      <button id="connect-btn" onclick="connectBLE()">
        Connect
      </button>

      <button id="disconnect-btn" class="hidden secondary" onclick="disconnectBLE()">
        Disconnect
      </button>

      <div class="button-row">
        <button id="motor-test-btn" class="hidden secondary" onclick="startMotorTest()">Start Motor Test</button>
        <button id="bluetooth-test-btn" class="hidden secondary" onclick="startBluetoothTest()">Start Bluetooth
          Test</button>
      </div>

      <div class="button-row">
        <button id="stop-btn" class="stop-cmd-btn" onclick="stopTests()">STOP TESTS</button>
      </div>

      <div id="status" class="status disconnected">
        Disconnected
      </div>

      <div class="log">
        <div class="log-title">Command Log</div>
        <ul id="command-log"></ul>
        <button onclick="downloadLog(document.getElementById('command-log'))">Download Command Log</button>

        <div class="log-title">Data Log</div>
        <ul id="data-log"></ul>
        <button onclick="downloadLog(document.getElementById('data-log'))">Download Data Log</button>
      </div>
    </div>
  </div>

  <script>
    // Configuration
    const DEVICE_NAME = "NanoESP32-Willow-BLE";
    const SERVICE_UUID = "55f8a5ee-886f-4929-a3ab-5745cbbceab5";
    const CMD_CHAR_UUID = "30bce33a-6e60-4306-ad36-8718f82ee801";
    const DATA_CHAR_UUID = "fef211ef-bc20-4f2f-9e9d-3cb6c7b6f772";
    const METRICS_CHAR_UUID = "555ff5a9-d76d-4945-b7a2-f26612fc5be5";
    const ACCESS_PASSWORD = "Pocki06";

    // State Variables
    let unlocked = false;
    let statusEl = document.getElementById("status");
    let testRunning = false;

    // Connection States
    let device = null;
    let cmdChar = null;
    let dataChar = null;
    let metricsChar = null;
    let connected = false;

    // Bluetooth Test Definitions
    let packetSeq = 0;
    let sendIntervalMs = 1000; // Interval between packets for bluetooth test in milliseconds

    function updateUI() {
      // ----- Login Section ------
      const loginSection = document.getElementById("login-section");
      loginSection.classList.toggle("hidden", unlocked);

      // ----- Control Panel -----
      const controlPanel = document.getElementById("control-panel");
      controlPanel.classList.toggle("hidden", !unlocked);

      // ----- Connect / Disconnect Buttons -----
      const connectBtn = document.getElementById("connect-btn");
      const disconnectBtn = document.getElementById("disconnect-btn");

      connectBtn.disabled = connected;
      connectBtn.textContent = connected ? "Connected" : "Connect";
      connectBtn.classList.toggle("connected", connected);

      disconnectBtn.classList.toggle("hidden", !connected);

      // ----- Motor Test Button -----
      const motorTestBtn = document.getElementById("motor-test-btn");
      motorTestBtn.disabled = !connected || testRunning;
      motorTestBtn.classList.toggle("hidden", !connected);

      // ----- Bluetooth Test Button -----
      const BTStartBtn = document.getElementById("bluetooth-test-btn");
      BTStartBtn.disabled = !connected || testRunning;
      BTStartBtn.classList.toggle("hidden", !connected);

      // ---- Stop Button -----
      const stopBtn = document.getElementById("stop-btn");
      stopBtn.disabled = !connected || !testRunning;
      stopBtn.classList.toggle("hidden", !connected || !testRunning);

      // ----- Status Text -----
      if (!connected) {
        statusEl.textContent = "Disconnected";
        statusEl.className = "status disconnected";
      } else if (testRunning) {
        statusEl.textContent = "Connected — Test Running";
        statusEl.className = "status connected";
      } else {
        statusEl.textContent = "Connected";
        statusEl.className = "status connected";
      }
    }

    // Password Gate
    function unlock() {
      const entered = document.getElementById("password-input").value;
      const status = document.getElementById("login-status");

      if (entered === ACCESS_PASSWORD) {
        unlocked = true;
        updateUI();
      } else {
        status.textContent = "Incorrect password";
        status.style.color = "red";
      }
    }

    // BLE Connection Functions
    async function connectBLE() {
      if (!unlocked) return;

      try {
        document.getElementById("status").textContent = "Connecting..."
        document.getElementById("status").style.color = "var(--muted)";

        device = await navigator.bluetooth.requestDevice({
          filters: [{
            services: [SERVICE_UUID]
          }],
        });

        device.addEventListener('gattserverdisconnected', disconnectBLE);

        const server = await device.gatt.connect();
        const service = await server.getPrimaryService(SERVICE_UUID);

        cmdChar = await service.getCharacteristic(CMD_CHAR_UUID);
        dataChar = await service.getCharacteristic(DATA_CHAR_UUID);
        metricsChar = await service.getCharacteristic(METRICS_CHAR_UUID);

        connected = true;
        updateUI();
        logCommand(`Connected to ${DEVICE_NAME}`);

        // Enable notifications (bluetooth metrics come back this way)
        await metricsChar.startNotifications();
        metricsChar.addEventListener(
          "characteristicvaluechanged",
          handleMetricsNotification
        );
        logCommand("BLE Notifications enabled");
      }
      catch (error) {
        console.error(error);
        statusEl.textContent = "Connection failed";
        statusEl.className = "status disconnected";
        logCommand(`Connection failed`);
      }
    }

    function disconnectBLE() {
      if (!connected) return;
      connected = false;

      if (device?.gatt?.connected) {
        device.gatt.disconnect();
      }

      device = null;
      cmdChar = null;
      dataChar = null;
      metricsChar = null;
      testRunning = false;
      updateUI();
      logCommand(`Disconnected from ${DEVICE_NAME}`);
    }

    async function sendCommand(command) {
      if (!connected) {
        alert("Not connected");
        return;
      }

      const data = new TextEncoder().encode(command);
      await cmdChar.writeValue(data);
      logCommand(`Sent command: ${command}`);
    }

    async function startMotorTest() {
      if (!connected) {
        alert("Not connected");
        logCommand("Failed to start motor test - not connected");
        return;
      }

      if (testRunning) {
        alert("Test already running");
        return;
      }

      testRunning = true;
      updateUI();
      await sendCommand("START_MOTOR");
      logCommand("Motor test Complete");
      testRunning = false;
      updateUI();
    }

    async function startBluetoothTest() {
      if (!connected) {
        alert("Not connected");
        logCommand("Failed to start Bluetooth test - not connected");
        return;
      }

      if (testRunning) {
        alert("Bluetooth test already running");
        return;
      }
      testRunning = true;
      updateUI();

      await flushBLE(); // Ensure any pending BLE operations are complete before starting

      await sendCommand("START_BT");

      await delay(150); // Short delay to allow Arduino to prepare for incoming packets
      sendDataPacket();
    }

    async function sendDataPacket() {
      if (!testRunning) return;

      // Packet layout must match Arduino's expected format
      // uint32 seq | uint32 timestamp_us | padding

      const buffer = new ArrayBuffer(16);
      const view = new DataView(buffer);

      view.setUint32(0, packetSeq++, true);
      view.setUint32(4, performance.now() * 1000, true);
      view.setUint32(8, 0xAAAAAAAA, true);
      view.setUint32(12, 0xBBBBBBBB, true);

      try {
        await dataChar.writeValueWithoutResponse(buffer);
      } catch (e) {
        console.error("Packet send failed:", e);
      }

      logCommand(`Sent Data packet #${packetSeq - 1}`);
      setTimeout(sendDataPacket, sendIntervalMs);
    }

    function handleMetricsNotification(event) {
      const data = event.target.value;
      if (data.byteLength !== 18) return; // safety check for expected packet size

      const view = new DataView(data.buffer);

      const timestamp = view.getUint32(0, true);
      const per = view.getUint16(4, true) / 10000.0;
      const latencyUs = view.getUint32(6, true);
      const jitterUs = view.getUint32(10, true);
      const kbps = view.getUint32(14, true) / 100.0;

      const line =
        `t=${timestamp}ms ` +
        `PER=${per.toFixed(4)} ` +
        `lat=${latencyUs}us ` +
        `jit=${jitterUs}us ` +
        `thr=${kbps.toFixed(2)}kbps`;

      logData(line);
    }

    async function stopTests() {
      if (!connected) {
        alert("Not connected");
        return;
      }

      if (testRunning) {
        await sendCommand("STOP_MOTOR");
        await sendCommand("STOP_BT");
      }

      testRunning = false;
      updateUI();
      logCommand("Stopped all tests");
    }

    function delay(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    async function flushBLE() {
      await Promise.resolve();
    }

    function logCommand(command) {
      const log = document.getElementById("command-log");
      const entry = document.createElement("li");

      const time = new Date().toLocaleTimeString();
      entry.textContent = `[${time}] ${command}`;

      log.prepend(entry);
    }

    function logData(data) {
      const log = document.getElementById("data-log");
      const entry = document.createElement("li");

      entry.textContent = data;
      log.prepend(entry);
    }

    function downloadLog(log) {
      const items = Array.from(log.querySelectorAll("li")).map(li => li.textContent).reverse();
      const content = items.join("\n");
      const blob = new Blob([content], { type: "text/plain" });
      const url = URL.createObjectURL(blob);

      const a = document.createElement("a");
      a.href = url;
      a.download = log.id + ".txt";
      a.click();

      URL.revokeObjectURL(url);
    };
  </script>

</body>

</html>
