<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Pediatricats Senior Design Prototype Control Panel</title>
  <style>
    :root {
      --bg: #f7f8fa;
      --card: #ffffff;
      --text: #1f2933;
      --muted: #6b7280;
      --accent: #2563eb;
      --good: #16a34a;
      --running: #eab308;
      --danger: #dc2626;
      --border: #e5e7eb;
    }

    * {
      box-sizing: border-box;
    }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 40px 16px;
    }

    .container {
      max-width: 420px;
      margin: auto;
      background: var(--card);
      border-radius: 12px;
      padding: 32px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
    }

    h1 {
      font-size: 1.4rem;
      margin-bottom: 24px;
    }

    h2 {
      font-size: 1rem;
      margin-bottom: 8px;
      color: var(--muted);
      font-weight: 500;
    }

    p {
      font-size: 0.9rem;
      color: var(--muted);
      margin-bottom: 16px;
    }

    input {
      width: 100%;
      padding: 10px 12px;
      font-size: 1rem;
      border-radius: 8px;
      border: 1px solid var(--border);
      margin-bottom: 16px;
    }

    button {
      width: 100%;
      padding: 12px;
      font-size: 0.95rem;
      border-radius: 8px;
      border: none;
      background: var(--accent);
      color: var(--card);
      cursor: pointer;
      transition: opacity 0.15s ease;
    }

    button.secondary {
      background: var(--border);
      color: var(--text);
    }

    button:hover {
      opacity: 0.6;
    }

    button:active {
      opacity: 1.0;
    }

    button.connecting {
      background-color: var(--running);
      color: var(--card);
      cursor: progress;
    }

    button.connected {
      background-color: var(--good);
      color: var(--card);
      cursor: default;
    }

    button.connected:hover {
      opacity: 1;
    }

    .button-row {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }

    .cmd-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .status {
      margin-top: 20px;
      font-size: 0.9rem;
      font-weight: 500;
    }

    .hidden {
      display: none;
    }

    .test-btn.running {
      background-color: var(--running);
      color: var(--text);
      cursor: not-allowed;
      opacity: 1.0;
    }

    .test-btn.running:hover {
      opacity: 1.0;
    }

    .config-box {
      margin-top: 16px;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 8px 12px;
      background: var(--bg);
    }

    .config-box summary {
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      list-style: none;
    }

    .config-box summary::-webkit-details-marker {
      display: none;
    }

    .config-box summary::after {
      content: "▸";
      float: right;
      transition: transform 0.2s ease;
    }

    .config-box[open] summary::after {
      transform: rotate(90deg);
    }

    .config-content {
      margin-top: 12px;
    }

    .config-content label {
      display: block;
      font-size: 0.85rem;
      color: var(--muted);
      margin-top: 12px;
    }

    .config-content .checkbox {
      margin-top: 16px;
    }

    .log {
      margin-top: 24px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
      text-align: left;
    }

    .log-title {
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--muted);
      margin-bottom: 8px;
    }

    #command-log {
      list-style: none;
      padding: 0;
      margin: 0;
      max-height: 120px;
      overflow-y: auto;
    }

    #command-log li {
      font-size: 0.85rem;
      padding: 4px 0;
      color: var(--text);
      border-bottom: 1px solid var(--border);
    }

    #data-log {
      list-style: none;
      padding: 0;
      margin: 0;
      max-height: 120px;
      overflow-y: auto;
    }

    #data-log li {
      font-size: 0.85rem;
      padding: 4px 0;
      color: var(--text);
      border-bottom: 1px solid var(--border);
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Pediatricats Prototype Control Panel</h1>

    <!-- Login -->
    <div id="login-section">
      <h2>Access Required</h2>
      <p>Enter password to enable BLE connection</p>

      <input type="password" id="password-input" placeholder="Password" onkeydown="if (event.key === 'Enter') unlock()">

      <button onclick="unlock()">Unlock</button>
      <div id="login-status" class="status"></div>
    </div>

    <!-- Control Panel -->
    <div id="control-panel" class="hidden">
      <button id="connect-btn" onclick="connectBLE()">
        Connect
      </button>

      <button id="disconnect-btn" class="hidden secondary" onclick="disconnectBLE()">
        Disconnect
      </button>

      <div class="button-row">
        <button id="motor-test-btn" class="test-btn secondary hidden" data-test="motor"
          data-idle-label="Start Motor Test" data-running-label="Motor Test Running" onclick="startMotorTest()">
          Start Motor Test
        </button>

        <button id="bluetooth-test-btn" class="test-btn secondary hidden" data-test="bluetooth"
          data-idle-label="Start Bluetooth Test" data-running-label="Bluetooth Test Running"
          onclick="startBluetoothTest()">
          Start Bluetooth Test
        </button>
      </div>

      <div class="button-row">
        <button id="stop-btn" class="stop-cmd-btn" onclick="stopTests()">STOP TESTS</button>
      </div>

      <div id="status" class="status disconnected">
        Disconnected
      </div>

      <!-- Motor Test Configuration Tab -->
      <details class="config-box hidden">
        <summary>Motor Test Configuration</summary>

        <div class="config-content">
          <label>
            Rotation Angle (degrees):
            <input type="range" min="5" max="180" step="5" value="75"
              oninput="motorConfig.degrees = Number(this.value); degreesVal.textContent = this.value;">
          </label>
          <div><span id="degreesVal">70</span>°</div>

          <label>
            Speed:
            <input type="range" min="5" max="100" step="5" value="20"
              oninput="motorConfig.speed = Number(this.value); speedVal.textContent = this.value;">
          </label>
          <div><span id="speedVal">20</span>%</div>

          <label class="checkbox">
            Rotate in 5 degree steps and wait for user prompt between steps:
            <input type="checkbox" onchange="motorConfig.inSteps = this.checked;">
          </label>

          <label class="checkbox">
            Reverse motor direction:
            <input type="checkbox" onchange="motorConfig.reverse = this.checked;">
          </label>

        </div>
      </details>

      <!-- Bluetooth Test Configuration Tab -->
      <details class="config-box hidden">
        <summary>Bluetooth Test Configuration</summary>

        <div class="config-content">

          <label>
            Packet Interval
            <div class="value-row">
              <input type="range" min="50" max="2000" step="50" value="1000" oninput="
                 bluetoothConfig.sendIntervalMs = Number(this.value);
                 btIntervalVal.textContent = this.value;
               ">
              <span class="value-label">
                <span id="btIntervalVal">1000</span> ms
              </span>
            </div>
          </label>

          <label class="checkbox">
            Wait for user prompt between each 5 packets:
            <input type="checkbox" onchange="bluetoothConfig.inSteps = this.checked;">
          </label>

        </div>
      </details>

      <div class="log">
        <div class="log-title">Command Log</div>
        <ul id="command-log"></ul>
        <button onclick="downloadLog(document.getElementById('command-log'))">Download Command Log</button>

        <div class="log-title">Data Log</div>
        <ul id="data-log"></ul>
        <button onclick="downloadLog(document.getElementById('data-log'))">Download Data Log</button>
      </div>
    </div>
  </div>

  <script>
    // Configuration
    const DEVICE_NAME = "NanoESP32-Willow-BLE";
    const SERVICE_UUID = "55f8a5ee-886f-4929-a3ab-5745cbbceab5";
    const CMD_CHAR_UUID = "30bce33a-6e60-4306-ad36-8718f82ee801";
    const DATA_CHAR_UUID = "fef211ef-bc20-4f2f-9e9d-3cb6c7b6f772";
    const METRICS_CHAR_UUID = "555ff5a9-d76d-4945-b7a2-f26612fc5be5";
    const ACK_CHAR_UUID = "a2a1c8b3-4d7e-4f2a-9b1c-8e7d5f3a2b1c";
    const ACCESS_PASSWORD = "Pocki06";

    // ACK Status Codes
    const ACK_SUCCESS = 0x00;
    const ACK_ERROR = 0x01;

    // State Variables
    let unlocked = false;
    let statusEl = document.getElementById("status");
    let motorTestRunning = false;
    let bluetoothTestRunning = false;

    // Connection States
    let device = null;
    let cmdChar = null;
    let dataChar = null;
    let metricsChar = null;
    let ackChar = null;
    let connected = false;

    // Motor Test Configurations
    let motorConfig = {
      degrees: 75, // Degrees to rotate (5-180)
      speed: 20, // Motor speed percentage (5-100)
      inSteps: false, // Whether to do rotation in 5 degree steps and wait for user prompt between steps
      reverse: false // Whether to reverse motor direction
    };
    let totalRotation = 0; // Track total rotation for motor test

    // Bluetooth Test Configurations
    let bluetoothConfig = {
      sendIntervalMs: 1000, // Interval between packets for bluetooth test in milliseconds (50-2000)
      inSteps: false // Whether to wait for user prompt between packets instead of sending automatically
    };
    let packetSeq = 0; // Sequence number for bluetooth test packets
    let minIntervalMs = 10; // Minimum interval between packets

    // Metrics Computation State
    let lastMetricsArrivalUs = null;
    let intervalDeltasUs = [];

    // Sequence-matched link metrics from data echo packets
    const pendingPackets = new Map();
    const MAX_PENDING_PACKETS = 400;
    const RTT_SAMPLE_WINDOW = 100;
    const MIN_PACKET_TIMEOUT_US = 400000;
    const rttSamplesUs = [];

    let sentPacketCount = 0;
    let echoedPacketCount = 0;
    let echoedPayloadBytes = 0;
    let perErrorPackets = 0;
    let timedOutPacketCount = 0;
    let btTestStartUs = null;

    // Command IDs
    const STOP_MOTOR = 0b00;
    const START_MOTOR = 0b01;
    const STOP_BT = 0b10;
    const START_BT = 0b11;

    function updateUI() {
      // ----- Login Section -----
      const loginSection = document.getElementById("login-section");
      loginSection.classList.toggle("hidden", unlocked);

      // ----- Control Panel -----
      const controlPanel = document.getElementById("control-panel");
      controlPanel.classList.toggle("hidden", !unlocked);

      // ----- Connect / Disconnect Buttons -----
      const connectBtn = document.getElementById("connect-btn");
      const disconnectBtn = document.getElementById("disconnect-btn");

      connectBtn.disabled = connected;
      connectBtn.textContent = connected ? "Connected" : "Connect";
      connectBtn.classList.toggle("connected", connected);
      disconnectBtn.classList.toggle("hidden", !connected);

      // ----- Configuration Tabs -----
      const configBoxes = document.querySelectorAll(".config-box");
      configBoxes.forEach(box => box.classList.toggle("hidden", !connected));

      // ----- Test Buttons -----
      const testButtons = document.querySelectorAll(".test-btn");

      testButtons.forEach(btn => {
        const testType = btn.dataset.test;

        const isRunning =
          (testType === "motor" && motorTestRunning) ||
          (testType === "bluetooth" && bluetoothTestRunning);

        // Visibility
        btn.classList.toggle("hidden", !connected);


        if (connected && isRunning) {
          btn.disabled = true;
          btn.classList.add("running");
          btn.textContent = btn.dataset.runningLabel;
        } else {
          btn.disabled = !connected;
          btn.classList.remove("running");
          btn.textContent = btn.dataset.idleLabel;
        }
      });

      // ---- Stop Button -----
      const stopBtn = document.getElementById("stop-btn");
      const anyTestRunning = motorTestRunning || bluetoothTestRunning;

      stopBtn.disabled = !connected || !anyTestRunning;
      stopBtn.classList.toggle("hidden", !connected || !anyTestRunning);

      // ----- Status Text -----
      if (!connected) {
        statusEl.textContent = "Disconnected";
        statusEl.className = "status disconnected";
      } else if (anyTestRunning) {
        statusEl.textContent = "Connected — Test Running";
        statusEl.className = "status connected";
      } else {
        statusEl.textContent = "Connected";
        statusEl.className = "status connected";
      }
    }

    // Password Gate
    function unlock() {
      const entered = document.getElementById("password-input").value;
      const status = document.getElementById("login-status");

      if (entered === ACCESS_PASSWORD) {
        unlocked = true;
        updateUI();
      } else {
        status.textContent = "Incorrect password";
        status.style.color = "red";
      }
    }

    // BLE Connection Functions
    async function connectBLE() {
      if (!unlocked) return;

      try {
        document.getElementById("connect-btn").textContent = "Connecting..."
        document.getElementById("connect-btn").classList.add("connecting");

        device = await navigator.bluetooth.requestDevice({
          filters: [{
            services: [SERVICE_UUID]
          }],
        });

        device.addEventListener('gattserverdisconnected', disconnectBLE);

        const server = await device.gatt.connect();
        const service = await server.getPrimaryService(SERVICE_UUID);

        cmdChar = await service.getCharacteristic(CMD_CHAR_UUID);
        dataChar = await service.getCharacteristic(DATA_CHAR_UUID);
        metricsChar = await service.getCharacteristic(METRICS_CHAR_UUID);
        ackChar = await service.getCharacteristic(ACK_CHAR_UUID);

        connected = true;
        updateUI();
        logCommand(`Connected to ${DEVICE_NAME}`);

        // Enable data echo notifications
        await dataChar.startNotifications();
        dataChar.addEventListener(
          "characteristicvaluechanged",
          handleDataEchoNotification
        );
        logCommand("Data echo notifications enabled");

        // Enable notifications (metrics come back this way)
        await metricsChar.startNotifications();
        metricsChar.addEventListener(
          "characteristicvaluechanged",
          handleMetricsNotification
        );
        logCommand("Metrics notifications enabled");

        // Enable ACK notifications
        await ackChar.startNotifications();
        ackChar.addEventListener(
          "characteristicvaluechanged",
          handleAckNotification
        );
        logCommand("ACK notifications enabled");
      }
      catch (error) {
        console.error(error);
        statusEl.textContent = "Connection failed";
        statusEl.className = "status disconnected";
        document.getElementById("connect-btn").classList.remove("connecting");
        updateUI();
        logCommand(`Connection failed`);
      }
    }

    function disconnectBLE() {
      if (!connected) return;
      connected = false;

      if (device?.gatt?.connected) {
        device.gatt.disconnect();
      }

      device = null;
      cmdChar = null;
      dataChar = null;
      metricsChar = null;
      ackChar = null;
      motorTestRunning = false;
      bluetoothTestRunning = false;

      document.getElementById("connect-btn").classList.remove("connecting");
      updateUI();
      logCommand(`Disconnected from ${DEVICE_NAME}`);
    }

    async function startMotorTest() {
      if (!connected) {
        alert("Not connected");
        logCommand("Failed to start motor test - not connected");
        return;
      }

      if (motorTestRunning) {
        alert("Motor test already running");
        return;
      }

      await sendCommandPacket(START_MOTOR);
      motorTestRunning = true;
      updateUI();
      logCommand("Motor test started, waiting for ACK");
    }

    async function startBluetoothTest() {
      if (!connected) {
        alert("Not connected");
        logCommand("Failed to start Bluetooth test - not connected");
        return;
      }

      if (bluetoothTestRunning) {
        alert("Bluetooth test already running");
        return;
      }

      packetSeq = 0;
      pendingPackets.clear();
      rttSamplesUs.length = 0;
      sentPacketCount = 0;
      echoedPacketCount = 0;
      echoedPayloadBytes = 0;
      perErrorPackets = 0;
      timedOutPacketCount = 0;
      btTestStartUs = performance.now() * 1000;

      bluetoothTestRunning = true;
      updateUI();

      await flushBLE(); // Ensure any pending BLE operations are complete before starting

      await sendCommandPacket(START_BT);

      await delay(150); // Short delay to allow Arduino to prepare for incoming packets
      sendDataPacket();
    }

    async function stopTests() {
      if (!connected) {
        alert("Not connected");
        return;
      }

      if (motorTestRunning) await sendCommandPacket(STOP_MOTOR);
      if (bluetoothTestRunning) await sendCommandPacket(STOP_BT);

      motorTestRunning = false;
      bluetoothTestRunning = false;
      updateUI();
      logCommand("Stopped all tests");
    }

    async function sendCommandPacket(commandId) {
      if (!connected) {
        alert("Not connected");
        return;
      }

      let inSteps = 0;
      let reverse = 0;
      let payload16 = 0;

      const isMotorCmd = (commandId === 0b00 || commandId === 0b01);
      const isBtCmd = (commandId === 0b10 || commandId === 0b11);

      if (isMotorCmd) {
        inSteps = motorConfig.inSteps ? 1 : 0;
        reverse = motorConfig.reverse ? 1 : 0;

        // Motor payload (16 bits total):
        // upper 8 bits = degrees, lower 8 bits = speed
        payload16 =
          ((motorConfig.degrees & 0xff) << 8) |
          (motorConfig.speed & 0xff);

      } else if (isBtCmd) {
        inSteps = bluetoothConfig.inSteps ? 1 : 0;
        reverse = 0; // not used for bluetooth

        // Bluetooth payload (uint16 send interval)
        payload16 = bluetoothConfig.sendIntervalMs & 0xffff;

      } else {
        console.error("Invalid command ID:", commandId);
        return;
      }

      // Assemble 20‑bit packet
      const packet =
        ((commandId & 0b11) << 18) |
        ((inSteps & 0b1) << 17) |
        ((reverse & 0b1) << 16) |
        payload16;

      // Send as 3 bytes (big‑endian)
      const buffer = new ArrayBuffer(3);
      const view = new DataView(buffer);
      view.setUint8(0, (packet >> 16) & 0xff);
      view.setUint8(1, (packet >> 8) & 0xff);
      view.setUint8(2, packet & 0xff);

      cmdChar.writeValue(buffer);

      // Log command in human‑readable format
      if (isMotorCmd) {
        logCommand(`Sent command: ${commandId === START_MOTOR ? "Start Motor" : "Stop Motor"}, ` +
          `degrees=${motorConfig.degrees}, speed=${motorConfig.speed}%, ` +
          `inSteps=${inSteps}, reverse=${reverse}`);
      } else if (isBtCmd) {
        logCommand(`Sent command: ${commandId === START_BT ? "Start Bluetooth Test" : "Stop Bluetooth Test"}, ` +
          `interval=${bluetoothConfig.sendIntervalMs}ms, inSteps=${inSteps}`);
      } else {
        logCommand(`Sent unknown command ${commandId}`);
      }
    }

    async function sendDataPacket() {
      if (!bluetoothTestRunning) return;

      const buffer = new ArrayBuffer(16);
      const view = new DataView(buffer);
      const nowUs = performance.now() * 1000;
      const seq = packetSeq++;

      view.setUint32(0, seq, true);
      view.setUint32(4, Math.floor(nowUs), true);
      view.setUint32(8, 0xAAAAAAAA, true);
      view.setUint32(12, 0xBBBBBBBB, true);

      pendingPackets.set(seq, {
        sendUs: nowUs,
        p0: 0xAAAAAAAA,
        p1: 0xBBBBBBBB,
        sizeBytes: buffer.byteLength
      });

      if (pendingPackets.size > MAX_PENDING_PACKETS) {
        const oldestSeq = pendingPackets.keys().next().value;
        pendingPackets.delete(oldestSeq);
      }

      try {
        await dataChar.writeValueWithoutResponse(buffer);
        sentPacketCount++;
      } catch (e) {
        pendingPackets.delete(seq);
        console.error("Packet send failed:", e);
        setTimeout(sendDataPacket, bluetoothConfig.sendIntervalMs);
        return;
      }

      logCommand(`Sent Data packet #${seq}`);
      setTimeout(sendDataPacket, bluetoothConfig.sendIntervalMs);
    }

    function sweepTimedOutPackets(nowUs) {
      const timeoutUs = Math.max(
        MIN_PACKET_TIMEOUT_US,
        bluetoothConfig.sendIntervalMs * 3000
      );

      for (const [seq, pkt] of pendingPackets) {
        if ((nowUs - pkt.sendUs) > timeoutUs) {
          pendingPackets.delete(seq);
          timedOutPacketCount++;
        }
      }
    }

    function popcount32(x) {
      x >>>= 0;
      let count = 0;
      while (x) {
        x &= (x - 1) >>> 0;
        count++;
      }
      return count;
    }

    function handleDataEchoNotification(event) {
      const dv = event.target.value;
      if (dv.byteLength !== 16) return;

      const view = new DataView(dv.buffer, dv.byteOffset, dv.byteLength);
      const seq = view.getUint32(0, true);
      const echoedTimestampUs = view.getUint32(4, true);
      const echoedP0 = view.getUint32(8, true);
      const echoedP1 = view.getUint32(12, true);

      const nowUs = performance.now() * 1000;
      sweepTimedOutPackets(nowUs);

      const sent = pendingPackets.get(seq);
      if (!sent) return;

      pendingPackets.delete(seq);
      echoedPacketCount++;
      echoedPayloadBytes += sent.sizeBytes;

      const rttUs = nowUs - sent.sendUs;
      rttSamplesUs.push(rttUs);
      if (rttSamplesUs.length > RTT_SAMPLE_WINDOW) {
        rttSamplesUs.shift();
      }

      const sentTsUs = Math.floor(sent.sendUs) >>> 0;
      const bitErrors =
        popcount32((echoedTimestampUs ^ sentTsUs) >>> 0) +
        popcount32((echoedP0 ^ sent.p0) >>> 0) +
        popcount32((echoedP1 ^ sent.p1) >>> 0);

      if (bitErrors > 0) {
        perErrorPackets++;
      }
    }

    function handleMetricsNotification(event) {
      const nowUs = performance.now() * 1000;
      const dv = event.target.value;
      if (dv.byteLength !== 28) return;

      const view = new DataView(dv.buffer, dv.byteOffset, dv.byteLength);

      const pkt = {
        timestampMs: view.getUint32(0, true),
        txCount: view.getUint32(4, true),
        txBytes: view.getUint32(8, true),
        intervalMeanUs: view.getUint32(12, true),
        intervalJitterUs: view.getUint32(16, true),
        sendOverruns: view.getUint32(20, true),
        uptimeMs: view.getUint32(24, true)
      };

      // Inter-arrival Jitter (Client-side)
      if (lastMetricsArrivalUs !== null) {
        const deltaUs = nowUs - lastMetricsArrivalUs;
        intervalDeltasUs.push(deltaUs);
        if (intervalDeltasUs.length > 100) intervalDeltasUs.shift();
      }
      lastMetricsArrivalUs = nowUs;

      let arrivalJitterUs = 0;
      if (intervalDeltasUs.length > 1) {
        const mean =
          intervalDeltasUs.reduce((a, b) => a + b, 0) /
          intervalDeltasUs.length;

        const variance =
          intervalDeltasUs.reduce(
            (s, d) => s + (d - mean) ** 2,
            0
          ) / intervalDeltasUs.length;

        arrivalJitterUs = Math.sqrt(variance);
      }

      // Sequence-matched RTT average from data echoes
      let avgRttUs = 0;
      if (rttSamplesUs.length) {
        avgRttUs =
          rttSamplesUs.reduce((a, b) => a + b, 0) /
          rttSamplesUs.length;
      }

      // Throughput over the current test window (echoed packets only)
      let throughputKbps = 0;
      const elapsedUs = btTestStartUs ? (nowUs - btTestStartUs) : 0;
      if (elapsedUs > 0) {
        throughputKbps =
          (echoedPayloadBytes * 8) / (elapsedUs / 1e6) / 1000;
      }

      // PER combines integrity errors and packets that appear dropped
      sweepTimedOutPackets(nowUs);
      const erroredPackets = perErrorPackets + timedOutPacketCount;
      const per = sentPacketCount > 0 ? (erroredPackets / sentPacketCount) : 0;

      logData(
        `Metrics @ ${pkt.timestampMs}ms: ` +
        `RTT=${Math.round(avgRttUs)}us, ` +
        `PER=${(per * 100).toFixed(2)}%, ` +
        `HostJitter=${Math.round(arrivalJitterUs)}us, ` +
        `FwJitter=${pkt.intervalJitterUs}us, ` +
        `Throughput=${throughputKbps.toFixed(2)}kbps, ` +
        `Overruns=${pkt.sendOverruns}`
      );
    }

    function handleAckNotification(event) {
      const data = event.target.value;
      if (data.byteLength !== 6) return; // safety check for expected ACK packet size

      const view = new DataView(data.buffer, data.byteOffset, data.byteLength);

      const commandId = view.getUint8(0);
      const status = view.getUint8(1);
      const timestampMs = view.getUint32(2, true);

      const statusStr = status === ACK_SUCCESS ? "SUCCESS" : "ERROR";
      const commandStr = getCommandName(commandId);

      logCommand(`ACK: ${commandStr} [${statusStr}] at ${timestampMs}ms`);

      if (commandId === START_MOTOR) {
        motorTestRunning = false;
        updateUI();

        if (status === ACK_SUCCESS) {
          logCommand("Motor test completed");
        } else {
          logCommand("Motor test ended with error ACK");
        }
      }

      if (commandId === STOP_MOTOR) {
        motorTestRunning = false;
        updateUI();
      }

      if (commandId === STOP_BT) {
        bluetoothTestRunning = false;
        updateUI();
      }
    }

    function getCommandName(commandId) {
      switch (commandId) {
        case STOP_MOTOR:
          return "STOP_MOTOR";
        case START_MOTOR:
          return "START_MOTOR";
        case STOP_BT:
          return "STOP_BT";
        case START_BT:
          return "START_BT";
        default:
          return `UNKNOWN(${commandId})`;
      }
    }

    function delay(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    async function flushBLE() {
      await Promise.resolve();
    }

    function logCommand(command) {
      const log = document.getElementById("command-log");
      const entry = document.createElement("li");

      const time = new Date().toLocaleTimeString();
      entry.textContent = `[${time}] ${command}`;

      log.prepend(entry);
    }

    function logData(data) {
      const log = document.getElementById("data-log");
      const entry = document.createElement("li");

      entry.textContent = data;
      log.prepend(entry);
    }

    function downloadLog(log) {
      const items = Array.from(log.querySelectorAll("li")).map(li => li.textContent).reverse();
      const content = items.join("\n");
      const blob = new Blob([content], { type: "text/plain" });
      const url = URL.createObjectURL(blob);

      const a = document.createElement("a");
      a.href = url;
      a.download = log.id + ".txt";
      a.click();

      URL.revokeObjectURL(url);
    };
  </script>

</body>
