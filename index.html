<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Pediatricats Senior Design Prototype Control Panel</title>
  <link rel="stylesheet" href="index.css">
</head>

<body>
  <div class="container">
    <h1>Prototype Control Panel</h1>

    <div class="logo-container">
      <img src="Logo.png" alt="Pediatricats Logo" class="logo">
    </div>

    <!-- Login -->
    <div id="login-section">
      <h2>Access Required</h2>
      <p>Enter password to enable BLE connection</p>

      <input type="password" id="password-input" placeholder="Password">

      <button id="unlock-btn">Unlock</button>
      <div id="login-status" class="status"></div>
    </div>

    <!-- Control Panel -->
    <div id="control-panel" class="hidden">
      <button id="connect-btn">
        Connect
      </button>

      <button id="disconnect-btn" class="hidden secondary">
        Disconnect
      </button>

      <div class="button-row">
        <button id="motor-test-btn" class="test-btn secondary hidden" data-test="motor"
          data-idle-label="Start Motor Test" data-running-label="Motor Test Running">
          Start Motor Test
        </button>

        <button id="bluetooth-test-btn" class="test-btn secondary hidden" data-test="bluetooth"
          data-idle-label="Start Bluetooth Test" data-running-label="Bluetooth Test Running">
          Start Bluetooth Test
        </button>
      </div>

      <div class="button-row">
        <button id="stop-btn" class="stop-cmd-btn">STOP TESTS</button>
      </div>

      <div id="status" class="status disconnected">
        Disconnected
      </div>

      <div class="position-grid">
        <div class="position-card">
          <div class="label">Left</div>
          <div id="position1-angle" class="value">--.-°</div>
          <div id="position1-counts" class="subvalue">Waiting for BLE position data</div>
        </div>

        <div class="position-card">
          <div class="label">Right</div>
          <div id="position2-angle" class="value">--.-°</div>
          <div id="position2-counts" class="subvalue">Waiting for BLE position data</div>
        </div>
      </div>

      <!-- Motor Test Configuration Tab -->
      <details class="config-box hidden">
        <summary>Motor Test Configuration</summary>

        <div class="config-content">
          <label>
            Rotation Angle (degrees):
            <input id="motor-angle-slider" type="range" min="5" max="180" step="5" value="75">
          </label>
          <div><span id="degreesVal">70</span>°</div>

          <label>
            Speed:
            <input id="motor-speed-slider" type="range" min="5" max="100" step="5" value="20">
          </label>
          <div><span id="speedVal">20</span>%</div>

          <label class="checkbox">
            Rotate in 5 degree steps and wait for user prompt between steps:
            <input id="motor-steps-checkbox" type="checkbox">
          </label>

          <label class="checkbox">
            Reverse motor direction:
            <input id="motor-reverse-checkbox" type="checkbox">
          </label>

        </div>
      </details>

      <!-- Bluetooth Test Configuration Tab -->
      <details class="config-box hidden">
        <summary>Bluetooth Test Configuration</summary>

        <div class="config-content">

          <label>
            Packet Interval
            <div class="value-row">
              <input id="bt-interval-slider" type="range" min="50" max="2000" step="50" value="1000">
              <span class="value-label">
                <span id="btIntervalVal">1000</span> ms
              </span>
            </div>
          </label>

          <label class="checkbox">
            Wait for user prompt between each 5 packets:
            <input id="bt-steps-checkbox" type="checkbox">
          </label>

        </div>
      </details>

      <div class="log">
        <div class="log-title">Command Log</div>
        <ul id="command-log"></ul>
        <button id="download-command-log-btn">Download Command Log</button>

        <div class="log-title">Data Log</div>
        <ul id="data-log"></ul>
        <button id="download-data-log-btn">Download Data Log</button>
      </div>
    </div>
  </div>

  <script src="index.js"></script>

</body>

</html>
