<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pediatricats Senior Design Prototype Control Panel</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      max-width: 400px;
      margin: 40px auto;
      text-align: center;
    }
    button {
      font-size: 16px;
      padding: 10px 20px;
      margin: 8px;
      width: 120px;
    }
    #status {
      margin-top: 20px;
      font-weight: bold;
    }
    .hidden {
      display: none;
    }
  </style>
</head>

<body>
  <h1>Pediatricats Prototype Control Panel</h1>
  
  <!-- Login / Password Gate -->
  <div id="login-section">
    <h2>Access Required</h2>
    <p>Enter password to enable BLE control</p>
    <input 
      type="password" 
      id="password-input" 
      placeholder="Password">
    <br>
    <button onclick="unlock()">Unlock</button>
    <div id="login-status"></div>
  </div>
  
  <!-- BLE Control Panel -->
  <div id="control-panel" class="hidden">
    <button onclick="connectBLE()">Connect</button>
    <br>
    <button onclick="sendCommand('ON')">ON</button>
    <button onclick="sendCommand('OFF')">OFF</button>
    <button onclick="sendCommand('TOGGLE')">TOGGLE</button>

    <div id="status">Disconnected</div>
  </div>


<script>
  // Configuration
  const DEVICE_NAME  = "NanoESP32-Willow-BLE";
  const SERVICE_UUID = "55f8a5ee-886f-4929-a3ab-5745cbbceab5";
  const CHAR_UUID    = "a6a06cf5-71b2-489b-9f03-84dfe6fc6330";
  
  const ACCESS_PASSWORD = "Pocki06";
  
  // State Variables
  let unlocked = false;
  let characteristic = null;

  // Password Gate
  function unlock() {
    const entered = document.getElementById("password-input").value;
    const status  = document.getElementById("login-status");

    if (entered === ACCESS_PASSWORD) {
      unlocked = true;

      document.getElementById("login-section").classList.add("hidden");
      document.getElementById("control-panel").classList.remove("hidden");

      status.textContent = "";
    } else {
      status.textContent = "Incorrect password";
      status.style.color = "red";
    }
  }

  // BLE Connection Functions
  async function connectBLE() {
    if (!unlocked) return;

    try {
      document.getElementById("status").textContent = "Connecting...";

      const device = await navigator.bluetooth.requestDevice({
        filters: [{ name: DEVICE_NAME }],
        optionalServices: [SERVICE_UUID]
      });

      const server = await device.gatt.connect();
      const service = await server.getPrimaryService(SERVICE_UUID);
      characteristic = await service.getCharacteristic(CHAR_UUID);

      await characteristic.writeValue(
       new TextEncoder().encode("PING")
      );


      device.addEventListener("gattserverdisconnected", () => {
        characteristic = null;
        document.getElementById("status").textContent = "Disconnected";
      });


      document.getElementById("status").textContent = "Connected";
    }
    catch (error) {
      console.error(error);
      document.getElementById("status").textContent = "Connection failed";
    }
  }

  async function sendCommand(command) {
    if (!unlocked || !characteristic) {
      alert("Not connected");
      return;
    }

    const data = new TextEncoder().encode(command);
    await characteristic.writeValue(data);

    console.log("Sent:", command);
  }

  function onDisconnected() {
    characteristic = null;
    document.getElementById("status").textContent = "Disconnected";
  }
</script>

</body>
</html>
